# focus_to_kanata.py reads this file.
# The first app matching is the one
# whose layer/virtual_keys are send
# to kanata.
#
# Format:

# [[app]]
# name = "name_of_app regex"          # Optional.
# class = "class_of_app regex"        # Optional.
# caption = "title_of_window regex"   # Optional.
# layer = "kanata_layer_name"         # Optional.
# virtual_keys = ["vk1", "vk2", ...]  # Optional.

[[app]]
name = "chrome"
virtual_keys = ["vk_chrome"]

[[app]]
name = "obsidian"
virtual_keys = ["vk_obsidian"]

[[app]]
name = "foot"
caption = "^tmux.*(N|n)vim$"
virtual_keys = ["vk_nvim", "vk_tmux"]

[[app]]
name = "foot"
caption = "^tmux"
virtual_keys = ["vk_tmux", "vk_foot"]

[[app]]
name = "foot"
caption = "^Zellij"
virtual_keys = ["vk_zellij", "vk_foot"]

[[app]]
name = "foot"
caption = "(N|n)vim$"
virtual_keys = ["vk_nvim"]

[[app]]
name = "konsole"
caption = "zellij — Konsole$"
virtual_keys = ["vk_zellij"]

[[app]]
name = "konsole"
caption = "nvim — Konsole$"
virtual_keys = ["vk_nvim"]

[[app]]
name = "foot|konsole"
virtual_keys = ["vk_foot"]

[[app]]
name = "dolphin"
virtual_keys = ["vk_dolphin"]

[[app]]
caption = "(All Files|Save File — Skanpage)"
virtual_keys = ["vk_dolphin"]


# Run-or-raise: triggered by Kanata push-msg "APP: <name>"
# Only `name` is required. Defaults: class=name, command=name, process=command.

[[run_or_raise]]
name = "chrome"
class = "google-chrome"
command = "google-chrome-stable"
process = "chrome"

[[run_or_raise]]
name = "obsidian"
command = "flatpak run --branch=stable --arch=x86_64 --command=obsidian.sh --file-forwarding md.obsidian.Obsidian @@u %U @@"
process = "obsidian"

[[run_or_raise]]
name = "terminal"
class = "foot"
command = "foot"

[[run_or_raise]]
name = "fileexplorer"
class = "org.kde.dolphin"
command = "dolphin"
process = "dolphin$"

[[run_or_raise]]
name = "keepassxc"
class = "org.keepassxc.KeePassXC"
command = "keepassxc"
process = "keepassxc$"
